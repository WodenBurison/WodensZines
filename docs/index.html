<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woden&#39;s Zines</title>
<meta name="description" content="A shelf of tabletop journals, one verse per game">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub.css">
<link rel="stylesheet" href="https://zinecityring.neocities.org/zinering.css">
<style>
/* Small "hanging tag" signs under the main sign -- one linking to the links
   site, one to Ko-fi -- plus the coming-soon badge for a rack cover with no
   page behind it yet. All absolutely-positioned overlays, so none of them
   add height to the normal document flow, which is what keeps them from
   disturbing hub.css's pixel-phase-locked pegboard/rack math (see the
   comment on html,body there). Kept here rather than in hub.css for that
   same reason. (There used to also be a fixed top cross-link bar with
   Neocities/Links/Ko-fi -- redundant now that Neocities has its own rack
   cover and Links has this mini-sign, and it was the whole reason for a
   mobile-only .scene padding hack that no longer needs to exist.) */
.mini-signs {
  position: absolute;
  left: 50%;
  bottom: -14px;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  gap: 0.6rem;
  z-index: 3;
}
.mini-sign {
  display: inline-block;
  white-space: nowrap;
  background: var(--cardboard);
  background-image: repeating-linear-gradient(
    100deg,
    rgba(0, 0, 0, 0.03) 0px,
    rgba(0, 0, 0, 0.03) 2px,
    transparent 2px,
    transparent 7px
  );
  color: var(--ink);
  font-family: var(--font-sign);
  font-size: 1.05rem;
  line-height: 1.2;
  padding: 0.4rem 1.1rem 0.5rem;
  border-radius: 2px;
  box-shadow: 2px 4px 5px rgba(0, 0, 0, 0.35);
}
.mini-sign--links { transform: rotate(1.5deg); }
.mini-sign--kofi { transform: rotate(-2deg); font-size: 0.92rem; }
.mini-sign:hover { filter: brightness(1.06); }
@media (max-width: 720px) {
  .mini-signs { bottom: -12px; gap: 0.4rem; }
  .mini-sign { font-size: 0.8rem; padding: 0.3rem 0.8rem 0.4rem; }
  .mini-sign--kofi { font-size: 0.72rem; }
}
.mag-cover { position: relative; }
.mag-coming-soon-badge {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  background: rgba(0, 0, 0, 0.72);
  color: #fff;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-align: center;
  padding: 3px 4px;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="scene">
  <div class="sign-wrap">
    <div class="tape tape-left"></div>
    <div class="tape tape-right"></div>
    <div class="sign">Woden's Zines</div>
    <div class="mini-signs">
      <a class="mini-sign mini-sign--links" href="https://wodenburison.space/" target="_blank" rel="noopener">Woden's Links</a>
      <a class="mini-sign mini-sign--kofi" href="https://ko-fi.com/wodenburison" target="_blank" rel="noopener">Ko-fi</a>
    </div>
  </div>
  <div class="rack">
    <div class="shelf">
      <div class="shelf-mags"><a class="mag" href="https://wodenburison.neocities.org/" target="_blank" rel="noopener" aria-label="Woden Burison">
  <div class="mag-cover mag-cover--image" style="background-image: url('assets/cover-neocities.webp')"></div>
</a>
<div class="mag" aria-label="Solo TTRPG Corner -- coming soon">
  <div class="mag-cover mag-cover--image" style="background-image: url('assets/cover-solo-ttrpg.webp')">
    <span class="mag-coming-soon-badge">Coming Soon</span>
  </div>
</div>
<a class="mag" href="starforged/" aria-label="Woden is Starforged">
  <div class="mag-cover mag-cover--image" style="background-image: url('assets/cover-starforged.webp')"></div>
</a>
<div class="mag mag--ghost" aria-hidden="true">
  <div class="mag-cover">
    <div class="mag-masthead">&hellip;</div>
    <p class="mag-summary">More verses get racked up here as new games start.</p>
  </div>
</div></div>
      <div class="shelf-wire" aria-hidden="true">
        <div class="shelf-tines"></div>
        <div class="shelf-bar"></div>
      </div>
    </div>
  </div>
</div>
<div id="zine-city">
  <script src="https://zinecityring.neocities.org/zinecity-variables.js"></script>
  <script src="https://zinecityring.neocities.org/widgets/zinecityanimated.js"></script>
</div>
</body>
</html>
